<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance: Crown Chasers</title>
    
    <!-- VIBE JAM 2026 TRACKING WIDGET (RULE 02) -->
    <script async src="https://vibej.am/2026/widget.js" integrity="sha384-HcFXGZQXEl/KQgoTIH/WfKa9At5ZfXawZn70IrOvKL3jBMUV08D2MuA4vt/3y6Mo" crossorigin="anonymous"></script>
    
    <!-- ENGINE CORE (MICRO-ASSET PIPELINE) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js" integrity="sha384-CI3ELBVUz9XQO+97x6nwMDPosPR5XvsxW2ua7N1Xeygeh1IxtgqtCkGfQY9WWdHu" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js" integrity="sha384-GkidzTYmQg24v13sa3xhBBbvOLbVLO1QxfyKLdOWweQqNqS/iWwUst2T1fER2Xrg" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js" integrity="sha384-2EpLreWSFuZsk4hcSplXLhlHd/wzvDNF907bTGIXSXM0SlhJNzy4YK0DhBFvkFEs" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js" integrity="sha384-I3lsvPeDJYFrEAzn/TA0yhc/SCYKwpyfyq8lKzHYKohu43H9f7xc/Q9ZWgSVUDl3" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js" integrity="sha384-nhO9toQuMo5osCuA0l+YFpSqscZWxDu251Bnho2gD3kSPv1neEwHg0LyEmrA+mPj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js" integrity="sha384-mY+ii969jnDCI2HjRHftH2NZVkIO5ZGUkcnGCg3oVJ3kVstWQXwerYWBg+nbUG4R" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js" integrity="sha384-aVQ2QnWkoxhOefDB0YZB64OPVzujvccydpcC7UqMDJUK0ChwA382zOHmrWHGDRRa" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/RGBShiftShader.js" integrity="sha384-qYaR7E7da4vI5FtZQZMYT4kO2xxT3JXUE6daHRwljBNUNi5rnvnqOM+jIqhu4j7/" crossorigin="anonymous"></script>

    <link rel="stylesheet" href="css/terminal.css">
</head>
<body>

    <div id="scanlines"></div>

    <div id="terminal-ui">
        <div class="header">
            <h1>SYS.RESONANCE</h1>
            <div class="balance">SHARDS: <span id="shard-balance">0</span></div>
        </div>

        <div class="terminal-grid">
            <div class="panel">
                <h2>OPERATOR PROFILE</h2>
                <input type="text" id="callsign" placeholder="ENTER CALLSIGN" maxlength="12">
                <div class="stat-row"><span>High Score:</span> <span id="stat-highscore" style="color:var(--secondary)">0</span></div>
                <div class="stat-row"><span>Status:</span> <span style="color:var(--boost)">ONLINE</span></div>
                <button class="btn" id="btn-deploy">DEPLOY TO ARENA</button>
            </div>

            <div class="panel">
                <h2>GARAGE // CHASSIS</h2>
                <div id="chassis-list"></div>
                <h2 style="margin-top: 2rem;">MODS // TRAILS</h2>
                <div id="trail-list"></div>
            </div>
        </div>
    </div>

    <div id="hud">
        <div class="hud-top">
            <div class="combo-meter">
                <div class="leaderboard-title" style="text-align: left;">FLOW MULTIPLIER</div>
                <div class="combo-val">x<span id="combo-val">1.0</span></div>
                <div class="combo-bar"><div class="combo-fill" id="combo-bar-fill"></div></div>
            </div>
            
            <div class="leaderboard">
                <div class="leaderboard-title">CURRENT VIP</div>
                <div class="vip-name" id="vip-name">NOBODY</div>
                <div class="score-val">SCORE: <span id="my-score">0</span></div>
            </div>
        </div>
        
        <div class="speedometer"><span id="speed-val">000</span><span class="speed-label">VELOCITY</span></div>
        
        <div id="crosshair"></div>
        <div id="popup-container"></div>
        <div id="invert-flash"></div>
        <div id="damage-flash"></div>
        <div id="vip-flash"></div>
    </div>

    <div id="pause-menu">
        <h1>PAUSED</h1>
        <p>CLICK TO RESUME</p>
    </div>

    <!-- MAIN ORCHESTRATOR (ES6 MODULE ENTRY) -->
    <script type="module" src="js/main.js"></script>

</body>
</html>
